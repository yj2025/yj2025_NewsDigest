<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스 요약 서비스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="wrap">

    <div class="header">
      <div class="header-label">News Digest</div>
      <h1>뉴스 요약</h1>
      <p>URL을 입력하면 핵심 내용만 뽑아드립니다</p>
    </div>

    <div class="card">
      <div class="input-group">
        <input
          id="url"
          class="url-input"
          type="url"
          placeholder="https://n.news.naver.com/article/..."
        />
        <button class="btn" id="btn" onclick="summarize()">요약하기</button>
      </div>
    </div>

    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Summary</span>
        <span class="status-dot" id="dot"></span>
      </div>
      <div class="result-body" id="result-body">
        <span class="placeholder-text">요약 결과가 여기에 표시됩니다</span>
      </div>
      <div class="source-bar" id="source-bar">
        <span class="source-label">출처</span>
        <a class="source-link" id="source-link" href="#" target="_blank"></a>
      </div>
    </div>

    <div class="footer">AI-POWERED · KOBART SUMMARIZATION</div>

  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
